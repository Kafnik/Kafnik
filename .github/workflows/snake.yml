name: Generate Snake

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3.3.0
        with:
          github_user_name: Kafnik
          outputs: |
            # Светлая тема: обычная змейка
            dist/github-contribution-grid-snake.svg
            # Темная тема: как на твоем скриншоте (темный фон, яркая змейка)
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#8a2be2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}